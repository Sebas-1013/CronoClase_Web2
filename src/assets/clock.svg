<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="g" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#F1EFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#DAD2FF"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="54" fill="url(#g)" stroke="#493d9e" stroke-width="4" />
  <!-- ticks -->
  <g stroke="#493d9e" stroke-width="2">
    <!-- hour marks -->
    <line x1="60" y1="10" x2="60" y2="18" />
    <line x1="60" y1="102" x2="60" y2="110" />
    <line x1="10" y1="60" x2="18" y2="60" />
    <line x1="102" y1="60" x2="110" y2="60" />
  </g>
  <!-- minute/second ticks subtle -->
  <g stroke="#7a6fd6" stroke-width="1">
    <line x1="60" y1="14" x2="60" y2="16" />
    <line x1="60" y1="104" x2="60" y2="106" />
    <line x1="14" y1="60" x2="16" y2="60" />
    <line x1="104" y1="60" x2="106" y2="60" />
  </g>
  <!-- hands -->
  <g transform="translate(60,60)" fill="#493d9e">
    <rect x="-3" y="-10" width="6" height="28" rx="3" ry="3" transform="rotate(30)" />
    <rect x="-2" y="-36" width="4" height="48" rx="2" ry="2" transform="rotate(100)" />
    <circle cx="0" cy="0" r="4" fill="#493d9e" />
  </g>
  <ellipse cx="60" cy="86" rx="28" ry="6" fill="#000" opacity="0.05" />
</svg>